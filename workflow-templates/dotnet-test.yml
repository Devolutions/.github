name: testing

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out ${{ github.repository }}
        uses: actions/checkout@v6

      - name: Configure .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          # dotnet-version: 10.0.x # prefer using the global.json file
          global-json-file: path/to/global.json # update with the valid path (https://learn.microsoft.com/en-us/dotnet/core/tools/global-json)

      - name: Setup Artifactory
        uses: devolutions/actions/nuget-artifactory-setup@v1
        with:
          artifactory_password: ${{ secrets.ARTIFACTORY_PASSWORD }}
          artifactory_username: ${{ secrets.ARTIFACTORY_USERNAME }}

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build application
        run: dotnet build --no-restore

      - name: Test application
        run: dotnet test --no-build --verbosity normal
